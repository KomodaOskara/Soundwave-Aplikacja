name: Build All Desktop Apps
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Build Windows
        shell: bash
        run: |
          mkdir desktop-app
          cp icon.png desktop-app/icon.png
          echo "const { app, BrowserWindow } = require('electron');
          function createWindow() {
            const win = new BrowserWindow({ 
              width: 1000, height: 800, 
              title: 'Soundwave',
              webPreferences: { nodeIntegration: true, webSecurity: false } 
            });
            win.loadURL('https://muzyka.komodaoskara.pl');
          }
          app.whenReady().then(createWindow);" > desktop-app/main.js
          
          echo '{
            "name": "soundwave", 
            "productName": "Soundwave", 
            "version": "1.0.0", 
            "author": "Oskar <oskar@example.com>",
            "description": "Soundwave Music Player",
            "license": "MIT",
            "homepage": "https://github.com/KomodaOskara/Soundwave-Aplikacja",
            "main": "main.js", 
            "devDependencies": {"electron": "^29.0.0", "electron-builder": "^24.13.3"}, 
            "build": {
              "appId": "com.soundwave.app", 
              "win": {"icon": "icon.png", "target": "nsis"}
            },
            "scripts": {"dist": "electron-builder"}
          }' > desktop-app/package.json
          
          cd desktop-app && npm install && npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: SoundWave-Windows
          path: desktop-app/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Build Linux (RPM)
        shell: bash
        run: |
          mkdir desktop-app
          cp icon.png desktop-app/icon.png
          echo "const { app, BrowserWindow } = require('electron');
          function createWindow() {
            const win = new BrowserWindow({ 
              width: 1000, height: 800, 
              title: 'Soundwave',
              webPreferences: { nodeIntegration: true, webSecurity: false } 
            });
            win.loadURL('https://muzyka.komodaoskara.pl');
          }
          app.whenReady().then(createWindow);" > desktop-app/main.js
          
          echo '{
            "name": "soundwave", 
            "productName": "Soundwave", 
            "version": "1.0.0", 
            "author": "Oskar <oskar@example.com>",
            "description": "Soundwave Music Player",
            "license": "MIT",
            "homepage": "https://github.com/KomodaOskara/Soundwave-Aplikacja",
            "main": "main.js", 
            "devDependencies": {"electron": "^29.0.0", "electron-builder": "^24.13.3"}, 
            "build": {
              "appId": "com.soundwave.app", 
              "linux": {"icon": "icon.png", "target": "rpm", "category": "Audio"}
            },
            "scripts": {"dist": "electron-builder"}
          }' > desktop-app/package.json
          
          cd desktop-app && npm install && npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: SoundWave-Linux
          path: desktop-app/dist/*.rpm
