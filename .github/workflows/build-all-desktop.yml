name: Build and Release
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Build Windows
        run: |
          mkdir desktop-app
          cp icon.png desktop-app/icon.png
          echo "const { app, BrowserWindow, Menu } = require('electron');
          const path = require('path');
          function createWindow() {
            const win = new BrowserWindow({ 
              width: 1000, height: 800, 
              icon: path.join(__dirname, 'icon.png'),
              webPreferences: { nodeIntegration: true, webSecurity: false } 
            });
            Menu.setApplicationMenu(null);
            win.loadURL('https://muzyka.komodaoskara.pl');
          }
          app.whenReady().then(createWindow);" > desktop-app/main.js
          
          echo '{
            "name": "soundwave", "productName": "Soundwave", "version": "1.0.0",
            "main": "main.js",
            "author": "Oskar",
            "description": "Soundwave Desktop App",
            "devDependencies": {"electron": "^29.4.6", "electron-builder": "^24.13.3"},
            "build": {
              "appId": "com.soundwave.app",
              "productName": "Soundwave",
              "win": {"icon": "icon.png", "target": "nsis"},
              "extraResources": ["icon.png"]
            }
          }' > desktop-app/package.json
          
          cd desktop-app && npm install && npx electron-builder --win
      - uses: actions/upload-artifact@v4
        with:
          name: SoundWave-Windows
          path: desktop-app/dist/*.exe
 build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Build Linux
        run: |
          mkdir desktop-app
          cp icon.png desktop-app/icon.png
          echo "const { app, BrowserWindow, Menu } = require('electron');
          const path = require('path');
          function createWindow() {
            const win = new BrowserWindow({ 
              width: 1000, height: 800, 
              icon: path.join(__dirname, 'icon.png'),
              webPreferences: { nodeIntegration: true, webSecurity: false } 
            });
            Menu.setApplicationMenu(null);
            win.loadURL('https://muzyka.komodaoskara.pl');
          }
          app.whenReady().then(createWindow);" > desktop-app/main.js
          
          # Uzupełnione pola: homepage, author, maintainer
          echo '{
            "name": "soundwave",
            "productName": "Soundwave",
            "version": "1.0.0",
            "main": "main.js",
            "homepage": "https://muzyka.komodaoskara.pl",
            "author": {
              "name": "Oskar",
              "email": "oskar@example.com"
            },
            "devDependencies": {"electron": "^29.4.6", "electron-builder": "^24.13.3"},
            "build": {
              "appId": "com.soundwave.app",
              "productName": "Soundwave",
              "linux": {
                "icon": "icon.png",
                "target": "rpm",
                "category": "Audio",
                "maintainer": "Oskar <oskar@example.com>"
              },
              "extraResources": ["icon.png"]
            }
          }' > desktop-app/package.json
          
          cd desktop-app && npm install && npx electron-builder --linux rpm
      - uses: actions/upload-artifact@v4
        with:
          name: SoundWave-Linux
          path: desktop-app/dist/*.rpm
