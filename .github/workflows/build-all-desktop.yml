name: Build All Desktop Apps
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Build Windows
        shell: bash
        run: |
          mkdir desktop-app
          cp icon.png desktop-app/icon.png
          echo "const { app, BrowserWindow, Menu } = require('electron');
          function createWindow() {
            const win = new BrowserWindow({ 
              width: 1000, height: 800, 
              title: 'Soundwave',
              icon: 'icon.png',
              webPreferences: { nodeIntegration: true, webSecurity: false } 
            });
            Menu.setApplicationMenu(null);
            win.loadURL('https://muzyka.komodaoskara.pl');
          }
          app.whenReady().then(createWindow);" > desktop-app/main.js
          
          echo '{
            "name": "soundwave", "productName": "Soundwave", "version": "1.0.0", 
            "author": "Oskar <oskar@example.com>",
            "build": {
              "appId": "com.soundwave.app", 
              "forceCodeSigning": false,
              "win": {"icon": "icon.png", "target": "nsis"}
            },
            "scripts": {"dist": "electron-builder --win --x64"}
          }' > desktop-app/package.json
          cd desktop-app && npm install --network-timeout=100000 && npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: SoundWave-Windows
          path: desktop-app/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Build Linux (RPM)
        shell: bash
        run: |
          mkdir desktop-app
          cp icon.png desktop-app/icon.png
          echo "const { app, BrowserWindow, Menu } = require('electron');
          function createWindow() {
            const win = new BrowserWindow({ 
              width: 1000, height: 800, 
              title: 'Soundwave',
              icon: 'icon.png',
              webPreferences: { nodeIntegration: true, webSecurity: false } 
            });
            Menu.setApplicationMenu(null);
            win.loadURL('https://muzyka.komodaoskara.pl');
          }
          app.whenReady().then(createWindow);" > desktop-app/main.js
          
          echo '{
            "name": "soundwave", "productName": "Soundwave", "version": "1.0.0",
            "author": "Oskar <oskar@example.com>",
            "build": {
              "appId": "com.soundwave.app", 
              "linux": {"icon": "icon.png", "target": "rpm", "category": "Audio"}
            },
            "scripts": {"dist": "electron-builder"}
          }' > desktop-app/package.json
          cd desktop-app && npm install --network-timeout=100000 && npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: SoundWave-Linux
          path: desktop-app/dist/*.rpm
