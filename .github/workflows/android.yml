name: Zbuduj aplikację Android (APK)

on:
  workflow_dispatch: # Pozwala na ręczne uruchomienie przyciskiem

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod z repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Skonfiguruj JDK (Java) dla Androida
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Zainstaluj zależności npm
        run: |
          npm install
          npm install @capacitor/android
          npm install -D @capacitor/assets

      - name: Dodaj platformę Android
        run: npx cap add android || true

      - name: Automatyczne przygotowanie struktury ikon
        run: |
          # Inteligentne szukanie pliku icon.png (ignoruje wielkość liter i szuka do 2 poziomów w głąb)
          ICON_FILE=$(find . -maxdepth 2 -iname "icon.png" | head -n 1)
          
          if [ -z "$ICON_FILE" ]; then
            echo "BŁĄD KRYTYCZNY: Nie znaleziono żadnego pliku o nazwie icon.png w repozytorium!"
            exit 1
          fi
          
          echo "Sukces! Znaleziono plik ikony pod ścieżką: $ICON_FILE"
          
          # Tworzymy folder assets wymagany przez narzędzie
          mkdir -p assets
          
          # Kopiujemy znalezioną ikonę pod wszystkie nazwy, których bezwzględnie żąda Capacitor Assets
          cp "$ICON_FILE" assets/icon-only.png
          cp "$ICON_FILE" assets/icon-foreground.png
          cp "$ICON_FILE" assets/icon-background.png
          cp "$ICON_FILE" assets/splash.png
          
          # Na wszelki wypadek zabezpieczamy też główny folder (starsze wersje narzędzia)
          cp "$ICON_FILE" icon.png
          cp "$ICON_FILE" splash.png

      - name: Wygeneruj ikony i ekrany startowe z pliku icon.png
        run: npx cap assets generate --android

      - name: Zsynchronizuj frontend do folderu Androida
        run: npx cap sync android

      - name: Zbuduj plik APK za pomocą Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Udostępnij gotowy plik APK do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: Soundwave-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
