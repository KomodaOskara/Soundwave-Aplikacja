name: Zbuduj aplikację Android (APK)

on:
  workflow_dispatch: # Pozwala na ręczne uruchomienie przyciskiem

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod z repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Skonfiguruj JDK (Java) dla Androida
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Zainstaluj zależności npm
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android@6 --legacy-peer-deps
          npm install -D @capacitor/assets --legacy-peer-deps

      - name: Dodaj platformę Android
        run: npx cap add android || true

      - name: Instalacja biblioteki Pillow dla Pythona
        run: python3 -m pip install Pillow

      - name: Inteligentna naprawa i przygotowanie plików ikon
        run: |
          python3 - <<EOF
          import os
          from PIL import Image

          icon_path = None
          for root, dirs, files in os.walk('.'):
              if any(p in root for p in ['node_modules', 'android', '.git', '.github']):
                  continue
              for f in files:
                  if f.lower() == 'icon.png':
                      icon_path = os.path.join(root, f)
                      break
              if icon_path:
                  break

          if not icon_path:
              print("BŁĄD KRYTYCZNY: Nie znaleziono pliku icon.png w repozytorium!")
              exit(1)

          print(f"Znaleziono plik ikony: {icon_path}. Rozpoczynamy automatyczne generowanie struktury...")
          
          try:
              img = Image.open(icon_path)
              os.makedirs('assets', exist_ok=True)
              
              img.save('assets/icon-only.png', 'PNG')
              img.save('assets/icon-foreground.png', 'PNG')
              img.save('assets/icon-background.png', 'PNG')
              img.save('assets/splash.png', 'PNG')
              img.save('assets/splash-dark.png', 'PNG')
              
              img.save('icon.png', 'PNG')
              img.save('splash.png', 'PNG')
              print("Sukces! Cała struktura wymagana przez Capacitor Assets została poprawnie przygotowana.")
          except Exception as e:
              print(f"Błąd podczas konwersji pliku graficznego: {e}")
              exit(1)
          EOF

          ls -la assets/

      - name: Wygeneruj ikony i ekrany startowe za pomocą Capacitor Assets
        run: npx cap assets generate --android

      - name: Zsynchronizuj frontend do folderu Androida
        run: npx cap sync android

      - name: Zbuduj plik APK za pomocą Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Udostępnij gotowy plik APK do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: Soundwave-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
