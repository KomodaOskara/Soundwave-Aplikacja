name: Zbuduj aplikację Android (APK)

on:
  workflow_dispatch: # Pozwala na ręczne uruchomienie przyciskiem

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod z repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Skonfiguruj JDK (Java) dla Androida
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Zainstaluj zależności npm
        run: |
          npm install
          npm install @capacitor/android
          npm install -D @capacitor/assets

      - name: Dodaj platformę Android
        run: npx cap add android || true

      - name: Wygeneruj ikony i ekrany startowe z pliku icon.png
        run: npx cap assets generate --android

      - name: Zsynchronizuj frontend do folderu Androida
        run: npx cap sync android

      - name: Zbuduj plik APK za pomocą Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Udostępnij gotowy plik APK do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: Soundwave-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
