name: Zbuduj aplikację Android (APK)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod z repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Skonfiguruj JDK (Java) dla Androida
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Zainstaluj zależności npm i wtyczkę MediaSession
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android@6 --legacy-peer-deps
          npm install -D @capacitor/assets --legacy-peer-deps
          npm install @capacitor-community/media-session@latest --legacy-peer-deps || \
            echo "WARN: media-session plugin not installed, continuing without it"

      - name: Dodaj platformę Android (jeśli nie istnieje)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Platforma Android już istnieje, pomijam dodawanie."
          fi

      - name: Zaktualizuj i połącz wtyczki Capacitora
        run: npx cap update android

      - name: Instalacja biblioteki Pillow dla Pythona
        run: python3 -m pip install Pillow

      - name: Inteligentna naprawa i przygotowanie plików ikon
        run: |
          python3 - <<EOF
          import os
          from PIL import Image
          icon_path = None
          for root, dirs, files in os.walk('.'):
              if any(p in root for p in ['node_modules', 'android', '.git', '.github', 'assets']):
                  continue
              for f in files:
                  if f.lower() == 'icon.png':
                      icon_path = os.path.join(root, f)
                      break
              if icon_path:
                  break
          if not icon_path:
              print("BŁĄD KRYTYCZNY: Nie znaleziono pliku icon.png!")
              exit(1)
          print(f"Znaleziono: {icon_path}")
          img = Image.open(icon_path)
          os.makedirs('assets', exist_ok=True)
          for name in ['icon-only','icon-foreground','icon-background','splash','splash-dark']:
              img.save(f'assets/{name}.png', 'PNG')
          img.save('icon.png', 'PNG')
          img.save('splash.png', 'PNG')
          print("Ikony gotowe.")
          EOF
          ls -la assets/

      - name: Wygeneruj ikony i ekrany startowe
        run: npx @capacitor/assets generate --android

      - name: Dodaj uprawnienia audio w tle i skonfiguruj WebView
        run: |
          python3 - <<'PYEOF'
          import os, glob

          # ── 1. AndroidManifest.xml — uprawnienia audio ──────────────────
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path) as f:
                  m = f.read()

              permissions = """
          <!-- SoundWave: uprawnienia do audio w tle i MediaSession -->
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
          <uses-permission android:name="android.permission.WAKE_LOCK"/>
          <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
          <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/>"""

              if 'FOREGROUND_SERVICE_MEDIA_PLAYBACK' not in m:
                  m = m.replace('</manifest>', permissions + '\n</manifest>')
                  print('✓ Uprawnienia audio dodane do manifestu')
              else:
                  print('✓ Uprawnienia już istnieją')

              with open(manifest_path, 'w') as f:
                  f.write(m)
          else:
              print('WARN: manifest nie znaleziony')

          # ── 2. MainActivity.java — konfiguracja WebView ─────────────────
          java_files = glob.glob('android/app/src/main/java/**/*.java', recursive=True)
          main_activity = next((f for f in java_files if 'MainActivity' in f), None)

          if main_activity:
              with open(main_activity) as f:
                  j = f.read()

              if 'import android.webkit.WebSettings' not in j:
                  j = j.replace(
                      'import com.getcapacitor.BridgeActivity;',
                      'import com.getcapacitor.BridgeActivity;\nimport android.webkit.WebSettings;'
                  )

              webview_config = '''
              // SoundWave: WebView config dla MediaSession i audio bez gestu
              try {
                  getBridge().getWebView().getSettings()
                      .setMediaPlaybackRequiresUserGesture(false);
                  getBridge().getWebView().getSettings()
                      .setMixedContentMode(WebSettings.MIXED_CONTENT_COMPATIBILITY_MODE);
              } catch (Exception e) { e.printStackTrace(); }'''

              if 'setMediaPlaybackRequiresUserGesture' not in j:
                  j = j.replace(
                      'super.onCreate(savedInstanceState);',
                      'super.onCreate(savedInstanceState);' + webview_config
                  )
                  print(f'✓ WebView skonfigurowany w {main_activity}')
              else:
                  print('✓ WebView już skonfigurowany')

              with open(main_activity, 'w') as f:
                  f.write(j)
          else:
              print('WARN: MainActivity.java nie znaleziony')

          # ── 3. network_security_config.xml ──────────────────────────────
          xml_dir = 'android/app/src/main/res/xml'
          os.makedirs(xml_dir, exist_ok=True)
          net_cfg = os.path.join(xml_dir, 'network_security_config.xml')
          if not os.path.exists(net_cfg):
              with open(net_cfg, 'w') as f:
                  f.write('''<?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">muzyka.komodaoskara.pl</domain>
              </domain-config>
          </network-security-config>''')
              print('✓ network_security_config.xml dodany')

          print('✓ Konfiguracja Android zakończona')
          PYEOF

      - name: Zsynchronizuj frontend do folderu Androida
        run: npx cap sync android

      - name: Zbuduj plik APK za pomocą Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Udostępnij gotowy plik APK
        uses: actions/upload-artifact@v4
        with:
          name: Soundwave-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
