name: Build Desktop App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Desktop App Files
        shell: bash
        run: |
          mkdir desktop-app
          echo "const { app, BrowserWindow } = require('electron');
          function createWindow() {
            const win = new BrowserWindow({ width: 1000, height: 800 });
            win.loadURL('https://muzyka.komodaoskara.pl');
          }
          app.whenReady().then(createWindow);" > desktop-app/main.js
          
          echo '{"name": "soundwave-app", "version": "1.0.0", "main": "main.js", "devDependencies": {"electron": "^29.0.0", "electron-builder": "^24.13.3"}, "scripts": {"dist": "electron-builder"}}' > desktop-app/package.json

      - name: Build EXE
        run: |
          cd desktop-app
          npm install
          npm run dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SoundWave-Setup
          path: desktop-app/dist/*.exe
